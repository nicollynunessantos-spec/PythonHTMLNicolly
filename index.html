<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python + HTML</title>

    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            background-color: #7ffa94;
            text-align: center;
            padding: 50px;
        }
         h1{
            color:#520647;
        }
        h2{
            color: #85005b;
        }
        p{
            color:#0e002f;
        }

        .card{
            background-color: #ddd2b3;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 15px rgba(79, 52, 7, 0.5);
        }

        button{
            background-color: #ddd2b3;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            margin: 10px;
            border-radius: 20px;
        }

        a{
            text-decoration: none;
        }

    </style>

</head>
<body>
    <div class = "card">
        <h1>Integração Pythom com HTML</h1>
        <h2>Bem Vindo!</h2>
        <p><strong>Nome: </strong> {{nome}}</p>
        <p><strong>Curso</strong>{{curso}}/</p>
    </div>
    <br>
    <button onclick = "mostrarMensagem()">
        Clique aqui
    </button>
  <div>
  <a href="sobre">
<button>Sobre</button>
  </a>
</div>

    <script>
        function mostraMensagem() {
            alert("Parabens seu site esta funcionando.")
        }
        </div>
    </script>

</body>
</html>
